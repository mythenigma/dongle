<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brent & Brent DTD Weekly</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #00d4ff, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 107, 53, 0.4);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); }
        }
        
        #chart, #espoChart, #utilizationChart {
            width: 100%;
            height: 700px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .loading {
            text-align: center;
            color: #00d4ff;
            font-size: 20px;
            padding: 50px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 20px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-label {
            font-size: 14px;
            color: #ccc;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Brent & Brent DTD Weekly Analysis</div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="latestBrent">--</div>
                <div class="stat-label">Latest Brent</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="latestDTD">--</div>
                <div class="stat-label">Latest DTD</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="spread">--</div>
                <div class="stat-label">DTD Premium</div>
            </div>
        </div>
        
        <div id="chart" class="loading">Loading awesome chart...</div>
        
        <!-- 第二个图表 - ESPO FOB -->
        <div class="stats" style="margin-top: 40px;">
            <div class="stat-card">
                <div class="stat-value" id="latestESPO">--</div>
                <div class="stat-label">Latest ESPO FOB</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="espoChange">--</div>
                <div class="stat-label">Daily Change</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="espoRange">--</div>
                <div class="stat-label">Week Range</div>
            </div>
        </div>
        
        <div id="espoChart" class="loading">Loading ESPO FOB chart...</div>
        
        <!-- 第三个图表 - Utilization Rate -->
        <div class="stats" style="margin-top: 40px;">
            <div class="stat-card">
                <div class="stat-value" id="latestUtilization">--</div>
                <div class="stat-label">Latest Utilization</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="utilizationChange">--</div>
                <div class="stat-label">Weekly Change</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="utilizationTrend">--</div>
                <div class="stat-label">Trend Status</div>
            </div>
        </div>
        
        <div id="utilizationChart" class="loading">Loading Utilization Rate chart...</div>
    </div>

    <script>
        // 初始化图表
        const chartDom = document.getElementById('chart');
        const myChart = echarts.init(chartDom, null, {
            renderer: 'canvas',
            useDirtyRect: false
        });
        
        // 从Brent_DTD_brent.txt文件加载数据
        fetch('./Brent_DTD_brent.txt')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(data => {
                console.log('Raw data loaded successfully');
                console.log('First 500 characters:', data.substring(0, 500));
                
                // 解析数据 - 更好的处理制表符和空格
                const lines = data.trim().split('\n');
                console.log('Total lines:', lines.length);
                console.log('First line (headers):', lines[0]);
                console.log('Second line (first data):', lines[1]);
                
                const dates = [];
                const brentData = [];
                const brentDTDData = [];
                
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue; // 跳过空行
                    
                    // 分割数据 - 优先使用制表符，其次是多个空格
                    let values;
                    if (line.includes('\t')) {
                        values = line.split('\t');
                    } else {
                        values = line.split(/\s+/);
                    }
                    
                    console.log(`Line ${i}: "${line}" -> values:`, values);
                    
                    if (values.length >= 3) {
                        const date = values[0].trim();
                        const brentStr = values[1].trim().replace(/\s+/g, '');
                        const dtdStr = values[2].trim().replace(/\s+/g, '');
                        
                        dates.push(date);
                        
                        const brent = parseFloat(brentStr);
                        const dtd = parseFloat(dtdStr);
                        
                        console.log(`Parsing - Date: ${date}, Brent: "${brentStr}" -> ${brent}, DTD: "${dtdStr}" -> ${dtd}`);
                        
                        brentData.push(!isNaN(brent) ? brent : null);
                        brentDTDData.push(!isNaN(dtd) && dtd > 0 ? dtd : null);
                    } else {
                        console.log(`Skipping line ${i} - insufficient values:`, values);
                    }
                }
                
                // 解析数据后，反转数组顺序使其按时间正序排列
                console.log('Parsed data points:', dates.length);
                console.log('Original order - First date:', dates[0], 'Last date:', dates[dates.length-1]);
                
                // 反转数组，使日期从旧到新排列（左到右）
                dates.reverse();
                brentData.reverse();
                brentDTDData.reverse();
                
                console.log('Reversed order - First date:', dates[0], 'Last date:', dates[dates.length-1]);
                console.log('Sample dates:', dates.slice(0, 5));
                console.log('Sample Brent:', brentData.slice(0, 5));
                console.log('Sample DTD:', brentDTDData.slice(0, 5));
                
                // 检查是否有有效数据
                if (dates.length === 0) {
                    throw new Error('No valid data found - check data format');
                }
                
                // 更新统计信息 - 现在最新数据在数组末尾
                const latestBrent = brentData.slice().reverse().find(val => val !== null);
                const latestDTD = brentDTDData.slice().reverse().find(val => val !== null);
                const spread = (latestDTD && latestBrent) ? (latestDTD - latestBrent).toFixed(2) : '--';
                
                document.getElementById('latestBrent').textContent = latestBrent ? `$${latestBrent.toFixed(2)}` : '--';
                document.getElementById('latestDTD').textContent = latestDTD ? `$${latestDTD.toFixed(2)}` : '--';
                document.getElementById('spread').textContent = spread !== '--' ? `$${spread}` : '--';
                
                console.log('Stats updated - Brent:', latestBrent, 'DTD:', latestDTD, 'Spread:', spread);
                
                // 计算数据范围
                const allValidBrent = brentData.filter(val => val !== null);
                const allValidDTD = brentDTDData.filter(val => val !== null);
                const allValues = [...allValidBrent, ...allValidDTD];
                const minValue = Math.min(...allValues);
                const maxValue = Math.max(...allValues);
                
                console.log('Data range - Min:', minValue, 'Max:', maxValue);
                
                // 配置图表选项
                const option = {
                    backgroundColor: 'transparent',
                    title: {
                        text: 'Brent & Brent DTD Weekly',
                        left: 'center',
                        top: 20,
                        textStyle: {
                            color: '#fff',
                            fontSize: 24,
                            fontWeight: 'bold'
                        }
                    },
                    toolbox: {
                        feature: {
                            dataZoom: {
                                yAxisIndex: 'none'
                            },
                            restore: {},
                            saveAsImage: {}
                        },
                        right: 20,
                        top: 20,
                        iconStyle: {
                            borderColor: '#999'
                        }
                    },
                    dataZoom: [
                        {
                            type: 'inside', // 鼠标滚轮缩放
                            start: Math.max(0, 100 - (10 / dates.length) * 100), // 显示最新10天（最右边）
                            end: 100, // 到最新数据
                            filterMode: 'filter'
                        },
                        {
                            type: 'slider', // 底部滑动条 - X轴时间缩放
                            start: Math.max(0, 100 - (10 / dates.length) * 100), // 显示最新10天
                            end: 100, // 到最新数据
                            height: 40,
                            bottom: 60,
                            handleStyle: {
                                color: '#00d4ff'
                            },
                            textStyle: {
                                color: '#999'
                            },
                            borderColor: '#333',
                            fillerColor: 'rgba(0, 212, 255, 0.2)',
                            backgroundColor: 'rgba(0, 0, 0, 0.3)'
                        },
                        {
                            type: 'slider', // 右侧滑动条 - Y轴价格缩放
                            yAxisIndex: 0,
                            start: 0,
                            end: 100,
                            width: 30,
                            right: 10,
                            handleStyle: {
                                color: '#ff8c00'
                            },
                            textStyle: {
                                color: '#999'
                            },
                            borderColor: '#333',
                            fillerColor: 'rgba(255, 140, 0, 0.2)',
                            backgroundColor: 'rgba(0, 0, 0, 0.3)',
                            showDetail: true,
                            showDataShadow: false
                        }
                    ],
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'cross',
                            crossStyle: {
                                color: '#00d4ff',
                                width: 1,
                                opacity: 0.8
                            }
                        },
                        backgroundColor: 'rgba(0, 0, 0, 0.9)',
                        borderColor: '#00d4ff',
                        borderWidth: 2,
                        textStyle: {
                            color: '#fff',
                            fontSize: 13
                        },
                        padding: [15, 20],
                        formatter: function(params) {
                            let result = `<div style="padding: 5px;">`;
                            result += `<div style="margin-bottom: 10px; font-weight: bold; color: #00d4ff; font-size: 14px;">${params[0].axisValue}</div>`;
                            params.forEach(param => {
                                if (param.value !== null && param.value !== undefined) {
                                    const color = param.seriesName === 'Brent' ? '#0070f3' : '#ff8c00';
                                    result += `<div style="margin: 6px 0; display: flex; align-items: center;">
                                        <span style="display:inline-block;margin-right:8px;border-radius:50%;width:8px;height:8px;background-color:${color};box-shadow: 0 0 10px ${color};"></span>
                                        <span style="color: #ccc; min-width: 80px;">${param.seriesName}:</span>
                                        <span style="font-weight: bold; color: ${color};">$${param.value.toFixed(2)}</span>
                                    </div>`;
                                }
                            });
                            
                            // 计算价差
                            const brentValue = params.find(p => p.seriesName === 'Brent')?.value;
                            const dtdValue = params.find(p => p.seriesName === 'Brent DTD')?.value;
                            if (brentValue && dtdValue) {
                                const spread = (dtdValue - brentValue).toFixed(2);
                                result += `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #333;">
                                    <span style="color: #888;">Spread: </span>
                                    <span style="font-weight: bold; color: ${spread >= 0 ? '#4CAF50' : '#f44336'};">$${spread}</span>
                                </div>`;
                            }
                            
                            result += `</div>`;
                            return result;
                        }
                    },
                    legend: {
                        data: ['Brent', 'Brent DTD'],
                        top: 60,
                        left: 'center',
                        textStyle: {
                            color: '#fff',
                            fontSize: 14
                        },
                        itemGap: 30
                    },
                    grid: {
                        left: '5%',
                        right: '3%',
                        bottom: '8%',
                        top: 100,
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        boundaryGap: false, // 线图不需要间距
                        data: dates,
                        axisLine: {
                            lineStyle: {
                                color: '#666',
                                width: 1
                            }
                        },
                        axisLabel: {
                            color: '#999',
                            fontSize: 11,
                            rotate: 0,
                            margin: 15,
                            interval: 'auto',
                            formatter: function(value) {
                                // 只显示月日，类似Excel: 17 Jul, 18 Jul
                                const date = new Date(value);
                                const day = date.getDate();
                                const month = date.toLocaleDateString('en', { month: 'short' });
                                return `${day} ${month}`;
                            }
                        },
                        splitLine: {
                            show: false
                        },
                        axisTick: {
                            show: true,
                            lineStyle: {
                                color: '#666'
                            }
                        }
                    },
                    yAxis: {
                        type: 'value',
                        scale: false,
                        min: function(value) {
                            // 自动适应最小值，留10%的空间
                            return Math.floor((value.min - (value.max - value.min) * 0.1) * 2) / 2;
                        },
                        max: function(value) {
                            // 自动适应最大值，留10%的空间
                            return Math.ceil((value.max + (value.max - value.min) * 0.1) * 2) / 2;
                        },
                        interval: 0.5, // 保持每0.5一个刻度
                        axisLine: {
                            lineStyle: {
                                color: '#666',
                                width: 1
                            }
                        },
                        axisLabel: {
                            color: '#999',
                            fontSize: 11,
                            formatter: function(value) {
                                // 显示格式: 67, 67.5, 68, 68.5, 69...
                                return value % 1 === 0 ? `${value}` : `${value.toFixed(1)}`;
                            }
                        },
                        splitLine: {
                            show: true,
                            lineStyle: {
                                color: 'rgba(255, 255, 255, 0.1)',
                                type: 'solid',
                                width: 1
                            }
                        },
                        axisTick: {
                            show: true,
                            lineStyle: {
                                color: '#666'
                            }
                        }
                    },
                    series: [
                        {
                            name: 'Brent',
                            type: 'line', // 改回线图
                            data: brentData,
                            smooth: false, // 不平滑，保持折线效果
                            symbol: 'circle',
                            symbolSize: 4,
                            showSymbol: true,
                            lineStyle: {
                                color: '#0070f3', // 蓝色，类似Excel
                                width: 2
                            },
                            itemStyle: {
                                color: '#0070f3',
                                borderColor: '#0070f3',
                                borderWidth: 2
                            },
                            emphasis: {
                                focus: 'series',
                                itemStyle: {
                                    shadowBlur: 10,
                                    shadowColor: 'rgba(0, 112, 243, 0.8)'
                                }
                            }
                        },
                        {
                            name: 'Brent DTD',
                            type: 'line', // 改回线图
                            data: brentDTDData,
                            smooth: false, // 不平滑，保持折线效果
                            symbol: 'circle',
                            symbolSize: 4,
                            showSymbol: true,
                            lineStyle: {
                                color: '#ff8c00', // 橙色，类似Excel
                                width: 2
                            },
                            itemStyle: {
                                color: '#ff8c00',
                                borderColor: '#ff8c00',
                                borderWidth: 2
                            },
                            emphasis: {
                                focus: 'series',
                                itemStyle: {
                                    shadowBlur: 10,
                                    shadowColor: 'rgba(255, 140, 0, 0.8)'
                                }
                            }
                        }
                    ],
                    animation: true,
                    animationDuration: 1500,
                    animationEasing: 'cubicOut'
                };
                
                // 设置选项并渲染图表
                myChart.setOption(option);
                
                // 动态高亮效果
                let currentIndex = 0;
                let animationTimer;
                
                function startAnimation() {
                    animationTimer = setInterval(() => {
                        myChart.dispatchAction({
                            type: 'showTip',
                            seriesIndex: 0,
                            dataIndex: currentIndex
                        });
                        currentIndex = (currentIndex + 1) % Math.min(dates.length, 50); // 只显示前50个点的动画
                    }, 4000);
                }
                
                // 启动动画
                setTimeout(startAnimation, 2000);
                
                // 鼠标交互控制
                chartDom.addEventListener('mouseenter', () => {
                    clearInterval(animationTimer);
                });
                
                chartDom.addEventListener('mouseleave', () => {
                    setTimeout(() => {
                        myChart.dispatchAction({ type: 'hideTip' });
                        startAnimation();
                    }, 2000);
                });
                
                // 响应式调整
                window.addEventListener('resize', () => {
                    myChart.resize();
                });
                
                // 添加数据缩放控制
                myChart.on('dataZoom', function() {
                    clearInterval(animationTimer);
                });
                
            })
            .catch(error => {
                console.error('Error loading data:', error);
                chartDom.innerHTML = `
                    <div style="text-align: center; color: #ff6b35; font-size: 18px; padding: 100px;">
                        <div style="font-size: 24px; margin-bottom: 10px;">⚠️ Data Loading Failed</div>
                        <div>Please check if Brent_DTD_brent.txt file exists</div>
                    </div>
                `;
            });
        
        // 初始化第二个图表
        const espoChartDom = document.getElementById('espoChart');
        const myEspoChart = echarts.init(espoChartDom, null, {
            renderer: 'canvas',
            useDirtyRect: false
        });
        
        // 从ESPO.txt文件加载数据
        fetch('./ESPO.txt')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(data => {
                console.log('ESPO Raw data loaded successfully');
                console.log('First 500 characters:', data.substring(0, 500));
                
                // 解析数据 - 更好的处理制表符和空格
                const lines = data.trim().split('\n');
                console.log('Total lines:', lines.length);
                console.log('First line (headers):', lines[0]);
                console.log('Second line (first data):', lines[1]);
                
                const espoDates = [];
                const espoData = [];
                
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue; // 跳过空行
                    
                    // 分割数据 - 优先使用制表符，其次是多个空格
                    let values;
                    if (line.includes('\t')) {
                        values = line.split('\t');
                    } else {
                        values = line.split(/\s+/);
                    }
                    
                    console.log(`ESPO Line ${i}: "${line}" -> values:`, values);
                    
                    if (values.length >= 2) {
                        const date = values[0].trim();
                        const espoStr = values[1].trim().replace(/\s+/g, '');
                        
                        espoDates.push(date);
                        
                        const espo = parseFloat(espoStr);
                        
                        console.log(`Parsing - Date: ${date}, ESPO: "${espoStr}" -> ${espo}`);
                        
                        espoData.push(!isNaN(espo) ? espo : null);
                    } else {
                        console.log(`Skipping ESPO line ${i} - insufficient values:`, values);
                    }
                }
                
                // 解析数据后，反转数组顺序使其按时间正序排列
                console.log('ESPO Parsed data points:', espoDates.length);
                console.log('Original order - First date:', espoDates[0], 'Last date:', espoDates[espoDates.length-1]);
                
                // 反转数组，使日期从旧到新排列（左到右）
                espoDates.reverse();
                espoData.reverse();
                
                console.log('Reversed order - First date:', espoDates[0], 'Last date:', espoDates[espoDates.length-1]);
                console.log('Sample ESPO dates:', espoDates.slice(0, 5));
                console.log('Sample ESPO:', espoData.slice(0, 5));
                
                // 检查是否有有效数据
                if (espoDates.length === 0) {
                    throw new Error('No valid ESPO data found - check data format');
                }
                
                // 更新统计信息 - 现在最新数据在数组末尾
                const latestESPO = espoData.slice().reverse().find(val => val !== null);
                const secondLatestESPO = espoData.slice().reverse().slice(1).find(val => val !== null);
                
                // 计算日变化
                const dailyChange = (latestESPO && secondLatestESPO) ? (latestESPO - secondLatestESPO).toFixed(2) : '--';
                
                // 计算最近7天的范围
                const recentData = espoData.slice(-7).filter(val => val !== null);
                const weekMin = recentData.length > 0 ? Math.min(...recentData) : null;
                const weekMax = recentData.length > 0 ? Math.max(...recentData) : null;
                const weekRange = (weekMin && weekMax) ? `${weekMin.toFixed(2)}-${weekMax.toFixed(2)}` : '--';
                
                document.getElementById('latestESPO').textContent = latestESPO ? `$${latestESPO.toFixed(2)}` : '--';
                document.getElementById('espoChange').textContent = dailyChange !== '--' ? `$${dailyChange}` : '--';
                document.getElementById('espoRange').textContent = weekRange !== '--' ? `$${weekRange}` : '--';
                
                console.log('ESPO Stats updated - Latest ESPO:', latestESPO, 'Daily Change:', dailyChange, 'Week Range:', weekRange);
                
                // 计算数据范围
                const allValidESPO = espoData.filter(val => val !== null);
                const espoMinValue = Math.min(...allValidESPO);
                const espoMaxValue = Math.max(...allValidESPO);
                
                console.log('ESPO Data range - Min:', espoMinValue, 'Max:', espoMaxValue);
                
                // 配置ESPO图表选项
                const espoOption = {
                    backgroundColor: 'transparent',
                    title: {
                        text: 'ESPO FOB Weekly',
                        left: 'center',
                        top: 20,
                        textStyle: {
                            color: '#fff',
                            fontSize: 24,
                            fontWeight: 'bold'
                        }
                    },
                    toolbox: {
                        feature: {
                            dataZoom: {
                                yAxisIndex: 'none'
                            },
                            restore: {},
                            saveAsImage: {}
                        },
                        right: 20,
                        top: 20,
                        iconStyle: {
                            borderColor: '#999'
                        }
                    },
                    dataZoom: [
                        {
                            type: 'inside', // 鼠标滚轮缩放
                            start: Math.max(0, 100 - (10 / espoDates.length) * 100), // 显示最新10天（最右边）
                            end: 100, // 到最新数据
                            filterMode: 'filter'
                        },
                        {
                            type: 'slider', // 底部滑动条 - X轴时间缩放
                            start: Math.max(0, 100 - (10 / espoDates.length) * 100), // 显示最新10天
                            end: 100, // 到最新数据
                            height: 40,
